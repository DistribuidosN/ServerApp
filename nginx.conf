# Configuración básica de procesos
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # --- CONFIGURACIÓN GLOBAL DE NFOK ---
    # Desactivamos el límite de tamaño para permitir lotes y ZIPs pesados
    client_max_body_size 0;

    # ==========================================================
    # 1. GATEWAY PRINCIPAL (PUERTO 80)
    # Es la "cara" del sistema para Flutter y el mundo exterior.
    # ==========================================================
    server {
        listen       80;
        server_name  192.168.1.30;

        # --- A. REDIRECCIÓN DE API REST (GO - 50021) ---
        location /api/v1/ {
            proxy_pass http://localhost:50021/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # MANEJO DE CORS PARA FLUTTER
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                return 204;
            }
        }

        # --- B. FORWARDING DE IMÁGENES (/enfok-images/) ---
        location /enfok-images/ {
            # Se lo pasamos al segundo proxy en el puerto 8079
            proxy_pass http://localhost:8079/enfok-images/;
            
            # CRÍTICO: Mantenemos el Host original para no romper la firma de MinIO
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            
            proxy_buffering off;
            tcp_nodelay on;
        }

        # --- C. FORWARDING DE EXPORTACIONES (/export/) ---
        location /export/ {
            proxy_pass http://localhost:8079/export/;
            
            proxy_set_header Host $http_host;
            proxy_buffering off;
            
            # Tiempos de espera largos para descargas de ZIPs grandes
            proxy_connect_timeout 600s;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }
    }

    # ==========================================================
    # 2. PROXY DE MEDIOS (PUERTO 8079)
    # Es el "puente" interno que conecta con el MinIO real.
    # ==========================================================
    server {
        listen 8079;
        server_name 192.168.1.30;

        location / {
            # Destino final: El servidor de almacenamiento (MinIO)
            proxy_pass http://192.168.1.30:9999;
            
            # Seguimos arrastrando el Host que firmó Go (192.168.1.30)
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_buffering off;
            proxy_request_buffering off;
            
            # Soporte para streaming de datos
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}